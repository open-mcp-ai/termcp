<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>termcp</title>
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: ui-sans-serif, system-ui, sans-serif; background: #f6f8fa; color: #24292f; }
    .app-header { padding: 12px 16px; border-bottom: 1px solid #d0d7de; background: #fff; box-shadow: 0 1px 0 rgba(27,31,36,.04); }
    .app-header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; color: #1f2328; }
    .btn { font: inherit; padding: 8px 14px; border-radius: 6px; border: 1px solid #d0d7de; background: #f6f8fa; color: #24292f; cursor: pointer; }
    .btn:hover { background: #eaeef2; border-color: #afb8c1; }
    .btn-primary { background: #2da44e; border-color: #2da44e; color: #fff; }
    .btn-primary:hover { background: #2c974b; border-color: #2c974b; }
    .btn-danger { background: #cf222e; border-color: #cf222e; color: #fff; }
    .btn-danger:hover { background: #a40e26; border-color: #a40e26; }
    .dock { padding: 16px; min-height: calc(100% - 52px); }
    .entries-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; width: 100%; }
    .entries-toolbar .dock-title { margin: 0; }
    .entries-toolbar-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .icon-btn {
      width: 36px; height: 36px; padding: 0; border-radius: 8px; border: 1px solid #d0d7de;
      background: #fff; color: #24292f; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s, color .12s;
    }
    .icon-btn:hover { background: #eaeef2; border-color: #afb8c1; }
    .icon-btn-primary { background: #2da44e; border-color: #2da44e; color: #fff; }
    .icon-btn-primary:hover { background: #2c974b; border-color: #2c974b; color: #fff; }
    .icon-btn svg { width: 18px; height: 18px; display: block; }
    .dock-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: #656d76; margin-bottom: 10px; }
    .conn-grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
    .conn-tile { position: relative; text-align: center; user-select: none; }
    /* Entry card: horizontal layout; address only in icon title */
    .conn-tile.entry-card {
      width: auto;
      min-width: 188px;
      max-width: 300px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 0;
      box-shadow: 0 1px 3px rgba(27,31,36,.08);
      transition: box-shadow 0.22s ease, transform 0.22s ease, border-color 0.22s ease;
      text-align: left;
    }
    .entry-card-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .conn-tile.entry-card .conn-tile-stack {
      margin: 0;
      flex-shrink: 0;
      width: auto;
    }
    .entry-card-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .conn-tile.entry-card:hover {
      border-color: #8c959f;
      box-shadow: 0 10px 28px rgba(27,31,36,.14);
      transform: translateY(-5px);
    }
    .conn-tile.entry-card:active {
      transform: translateY(-1px) scale(0.985);
      box-shadow: 0 4px 14px rgba(27,31,36,.12);
      transition-duration: 0.08s;
    }
    .entry-card-inner.entry-connecting {
      opacity: 0.9;
    }
    .conn-tile.entry-card.entry-connecting {
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9,105,218,.22), 0 10px 28px rgba(27,31,36,.12);
      transform: translateY(-3px);
    }
    .conn-tile.entry-card:hover .conn-tile-stack > .icon-wrap {
      transform: none;
    }
    /* Icon and dismiss (×) share positioning context */
    .conn-tile-stack { position: relative; width: 72px; margin: 0 auto 8px; }
    .conn-tile .conn-tile-stack > .icon-wrap {
      width: 72px; height: 72px; margin: 0; border-radius: 0; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; background: transparent; border: none;
      box-shadow: none; transition: transform .12s, filter .12s;
      cursor: pointer;
    }
    .conn-tile.entry-card .conn-tile-stack > .icon-wrap {
      width: 52px;
      height: 52px;
      font-size: 1.45rem;
      cursor: inherit;
    }
    .conn-tile.sess-tile:hover .conn-tile-stack > .icon-wrap {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }
    .conn-tile.sess-tile .conn-tile-stack > .icon-wrap {
      font-size: inherit;
    }
    .conn-tile .nm { font-size: 0.85rem; font-weight: 600; word-break: break-all; line-height: 1.2; color: #1f2328; cursor: default; }
    .conn-tile.entry-card .conn-nm-row { margin-top: 0; justify-content: flex-start; }
    .conn-nm-row { display: flex; align-items: flex-start; justify-content: center; gap: 4px; margin-top: 4px; max-width: 100%; }
    .conn-nm { font-size: 0.9rem; font-weight: 600; word-break: break-all; line-height: 1.25; color: #1f2328; cursor: inherit; text-align: left; flex: 1; min-width: 0; }
    .conn-nm:hover { color: inherit; }
    .conn-edit-btn {
      flex-shrink: 0; width: 22px; height: 22px; padding: 0; border: none; border-radius: 0;
      background: transparent; cursor: pointer; color: #57606a;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .conn-edit-btn svg { width: 14px; height: 14px; display: block; }
    .conn-edit-btn:hover { color: #0969da; background: rgba(9,105,218,.08); }
    .conn-tile .sub { font-size: 0.68rem; color: #656d76; margin-top: 2px; line-height: 1.2; max-height: 2.4em; overflow: hidden; }
    .conn-tile.sess-tile { cursor: pointer; width: 128px; }
    .sess-tile-body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 3px;
      margin-top: 4px;
      max-width: 100%;
    }
    .sess-entry-line {
      font-size: 0.82rem;
      font-weight: 600;
      color: #1f2328;
      line-height: 1.2;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sess-meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }
    .sess-sid-line {
      font-size: 0.65rem;
      font-family: ui-monospace, monospace;
      color: #656d76;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }
    .sess-copy-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      padding: 0;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      background: #fff;
      color: #57606a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .sess-copy-btn:hover { border-color: #0969da; color: #0969da; background: #f6f8fa; }
    .sess-terminal-ic {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 3px;
      overflow: hidden;
      line-height: 0;
      box-sizing: border-box;
    }
    .sess-terminal-ic img.terminal-shell-icon {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
    .conn-load-banner { display: none; margin-bottom: 12px; padding: 10px 12px; border-radius: 8px; background: #fff8c5; border: 1px solid #d4a72c; color: #24292f; font-size: 0.85rem; }
    #ui-copy-toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 7px 14px;
      font-size: 13px;
      color: #fff;
      background: rgba(35, 38, 42, 0.94);
      border-radius: 6px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
      z-index: 25000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #ui-copy-toast.ui-copy-toast-visible { opacity: 1; }
    .conn-tile .conn-tile-stack .sess-x {
      position: absolute; right: 2px; top: 2px; z-index: 3; width: 22px; height: 22px; padding: 0; border: none; border-radius: 4px;
      background: rgba(207,34,46,.12); color: #cf222e; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.08); opacity: 1; transition: background .12s, color .12s;
    }
    .conn-tile .conn-tile-stack .sess-x:hover { background: #cf222e; color: #fff; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(31,35,38,.45); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop.hidden { display: none; }
    .modal { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; max-width: 720px; width: 100%; max-height: 90vh; overflow: auto; box-shadow: 0 16px 48px rgba(27,31,36,.18); }
    .modal-h { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #d0d7de; background: #f6f8fa; }
    .modal-h h2 { margin: 0; font-size: 1rem; color: #1f2328; }
    .modal-body { padding: 16px; }
    .modal-body label { display: block; font-size: 0.75rem; color: #656d76; margin-bottom: 4px; }
    .modal-body input, .modal-body textarea, .modal-body select { width: 100%; font: inherit; padding: 8px 10px; border-radius: 6px; border: 1px solid #d0d7de; background: #fff; color: #24292f; margin-bottom: 12px; }
    .modal-body textarea { min-height: 220px; font-family: ui-monospace, monospace; font-size: 12px; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; margin-top: 8px; }
    .err { color: #cf222e; font-size: 0.85rem; margin: 0 0 8px; }
    .conn-field { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
    .conn-field label { font-size: 0.78rem; font-weight: 500; color: #57606a; }
    .conn-field input, .conn-field select, .conn-field textarea { font-size: 0.85rem; padding: 4px 8px; border: 1px solid #d0d7de; border-radius: 4px; }
    .conn-field select { background: #fff; }
    .conn-row { display: flex; gap: 8px; }
    .conn-row > .conn-field { flex: 1; }
    .psw-wrap { position: relative; }
    .psw-input { width: 100%; padding-right: 28px; margin: 0; box-sizing: border-box; }
    .psw-eye { position: absolute; right: 2px; top: 0; height: 100%; width: 26px; padding: 0; border: none; background: transparent; color: #888; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Floating terminal: dark theme; main page stays light */
    .shell-windows-container { position: fixed; inset: 0; pointer-events: none; z-index: 10000; }
    .shell-windows-container > * { pointer-events: auto; }
    .shell-window { position: fixed; width: 640px; height: 480px; min-width: 320px; min-height: 240px; background: #1e1e1e; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.4); border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; z-index: 10001; }
    .shell-window-header { display: flex; justify-content: space-between; align-items: stretch; gap: 0; padding: 0 8px 0 0; border-bottom: 1px solid #333; background: #2d2d2d; cursor: move; user-select: none; flex-shrink: 0; z-index: 2; min-height: 34px; flex-wrap: nowrap; }
    .shell-window-title-cluster { display: flex; align-items: center; gap: 6px; min-width: 0; padding-left: 8px; }
    .shell-window-title {
      margin: 0;
      font-size: 13px;
      color: #eee;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }
    .shell-window-title .sw-conn { color: #ccc; flex-shrink: 0; }
    .shell-title-id-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-shrink: 1;
    }
    .shell-sid-copy {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      min-width: 0;
    }
    .shell-header-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: center;
      width: 18px;
      height: 18px;
      color: #8b949e;
      margin-left: 6px;
      margin-right: 2px;
      line-height: 0;
    }
    .shell-terminal-ic {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      overflow: hidden;
      line-height: 0;
      box-sizing: border-box;
    }
    .shell-terminal-ic img.terminal-shell-icon {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
    .shell-sid-copy .sid {
      font-size: 12px;
      color: #7ee787;
      font-weight: 600;
      font-family: ui-monospace, monospace;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .title-copy-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      padding: 0;
      margin-left: 0;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .title-copy-btn:hover { color: #eee; background: rgba(255,255,255,.08); }
    .title-copy-btn svg { display: block; }
    .shell-window-header-btns { display: flex; gap: 0; flex-shrink: 0; margin-left: auto; align-self: center; }
    .shell-window-header-btns button { width: 26px; height: 26px; padding: 0; border: none; background: transparent; color: #aaa; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .shell-window-collapse-btn { position: relative; margin-right: 2px; }
    .shell-window-collapse-btn .ic-u, .shell-window-collapse-btn .ic-d { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
    .shell-window-header-btns button:hover { color: #eee; background: rgba(255,255,255,.08); }
    .shell-window-content { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; background: #1e1e1e; }
    .shell-terminal-wrap { flex: 1; min-height: 100px; min-width: 0; padding: 6px 6px 0; overflow: hidden; display: flex; flex-direction: column; }
    .shell-pending {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #8b949e;
      font-size: 14px;
      min-height: 160px;
      text-align: center;
      padding: 16px;
    }
    .shell-pending-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: shell-pending-spin 0.75s linear infinite;
    }
    @keyframes shell-pending-spin {
      to { transform: rotate(360deg); }
    }
    .shell-terminal-wrap .xterm { height: 100%; min-height: 0; }
    /* xterm appends .xterm-screen after .xterm-viewport (siblings). The screen layer stacks on top
       of the viewport and otherwise blocks the native scrollbar. Inset the screen so the gutter
       receives pointer events (scrollbar drag / track click). */
    .shell-terminal-wrap .xterm .xterm-screen {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      right: 14px;
      width: auto;
    }
    .shell-terminal-wrap .xterm .xterm-viewport {
      background-color: #1e1e1e !important;
      scrollbar-color: #484f58 #1e1e1e;
    }
    .shell-terminal-wrap .xterm .xterm-viewport::-webkit-scrollbar { width: 10px; height: 10px; }
    .shell-terminal-wrap .xterm .xterm-viewport::-webkit-scrollbar-track { background: #1e1e1e; }
    .shell-terminal-wrap .xterm .xterm-viewport::-webkit-scrollbar-thumb {
      background: #484f58;
      border-radius: 5px;
      border: 2px solid #1e1e1e;
    }
    .shell-terminal-wrap .xterm .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #6e7681; }
    .shell-window.shell-window-collapsed .shell-window-content,
    .shell-window.shell-window-collapsed .shell-window-resize-handle { display: none; }
    .shell-window.shell-window-collapsed { height: auto; min-height: 0; }
    .shell-window-resize-handle { position: absolute; right: 0; bottom: 0; width: 18px; height: 18px; pointer-events: none; z-index: 10; }
    .shell-window-resize-handle::after { content: ''; position: absolute; right: 2px; bottom: 2px; width: 12px; height: 12px; pointer-events: auto; cursor: nwse-resize; border-right: 2px solid rgba(255,255,255,.28); border-bottom: 2px solid rgba(255,255,255,.28); }
    .shell-tab-bar { display: flex; align-items: flex-end; gap: 0; flex-shrink: 0; padding-left: 8px; align-self: stretch; }
    .shell-tab-btn { width: 28px; height: 100%; padding: 0 4px; border: 1px solid transparent; border-radius: 4px 4px 0 0; background: transparent; color: #8b949e; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .12s, background .12s, border-color .12s; position: relative; bottom: -1px; }
    .shell-tab-btn:hover { color: #eee; background: rgba(255,255,255,.04); }
    .shell-tab-btn.active { color: #e6edf3; background: #1e1e1e; border-color: #333; border-bottom-color: #1e1e1e; }
    /* Shell channel tabs (bottom of terminal area, one tab per multiplexed shell) */
    .shell-channel-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      order: 10;
      background: #252526;
      border-top: 1px solid #333;
      min-height: 28px;
      max-height: 28px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #484f58 transparent;
    }
    .shell-channel-tabs::-webkit-scrollbar { height: 3px; }
    .shell-channel-tabs::-webkit-scrollbar-track { background: transparent; }
    .shell-channel-tabs::-webkit-scrollbar-thumb { background: #484f58; border-radius: 2px; }
    .shell-channel-tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      min-width: 50px;
      max-width: 140px;
      height: 24px;
      border-right: 1px solid #333;
      background: #2d2d2d;
      color: #999;
      cursor: pointer;
      font-size: 11px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 0;
      user-select: none;
      transition: background .1s, color .1s;
    }
    .shell-channel-tab:hover { background: #373737; color: #ccc; }
    .shell-channel-tab.active { background: #1e1e1e; color: #e0e0e0; border-top: 2px solid #58a6ff; }
    .shell-channel-tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .shell-channel-tab-close {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      padding: 0;
      border: none;
      border-radius: 3px;
      background: transparent;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      opacity: 0;
      transition: opacity .1s, color .1s, background .1s;
    }
    .shell-channel-tab:hover .shell-channel-tab-close,
    .shell-channel-tab.active .shell-channel-tab-close { opacity: 1; }
    .shell-channel-tab-close:hover { color: #fff; background: rgba(207,34,46,.6); }
    .shell-channel-tab-add {
      flex-shrink: 0;
      width: 26px;
      height: 24px;
      padding: 0;
      border: none;
      border-left: 1px solid #333;
      background: transparent;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: color .1s, background .1s;
    }
    .shell-channel-tab-add:hover { color: #fff; background: rgba(255,255,255,.06); }
    .shell-channel-tab-add:active { background: rgba(255,255,255,.1); }
    /* Channel body fills most of the terminal area */
    .shell-channel-body {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .shell-channel-instance {
      position: absolute;
      inset: 0;
      display: none;
    }
    .shell-channel-instance.active { display: block; }
    .shell-channel-instance .xterm { height: 100%; }
    /* Empty state when no shells */
    .shell-channel-empty {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8b949e;
      font-size: 12px;
      min-height: 100px;
    }
    .shell-channel-empty.show { display: flex; }
    .shell-channel-empty button {
      padding: 4px 12px;
      border: 1px solid #484f58;
      border-radius: 4px;
      background: #2d2d2d;
      color: #ccc;
      cursor: pointer;
      font-size: 12px;
    }
    .shell-channel-empty button:hover { background: #3d3d3d; border-color: #666; }

    @media (max-width: 768px) {
      .shell-window { width: calc(100vw - 16px); max-width: calc(100vw - 16px); min-width: 0; max-height: calc(100dvh - 16px); }
    }
  
    .conn-tile .conn-tile-stack .sess-fwd-overlay {
      position: absolute; left: 2px; top: 2px; z-index: 3;
      width: 22px; height: 22px; padding: 0; border: none;
      border-radius: 4px;
      background: rgba(9,105,218,.12); color: #0969da; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
      transition: background .12s, color .12s;
    }
    .conn-tile .conn-tile-stack .sess-fwd-overlay:hover { background: #0969da; color: #fff; }
    .sess-fwd-overlay svg { width: 11px; height: 11px; display: block; }
    .tools-tab {
      font: inherit; padding: 8px 14px; border: none; border-bottom: 2px solid transparent;
      background: transparent; color: #656d76; cursor: pointer; transition: color .12s, border-color .12s;
    }
    .tools-tab:hover { color: #24292f; }
    .tools-tab.active { color: #0969da; border-bottom-color: #0969da; font-weight: 600; }
    /* Light-themed tools panel (overrides dark shell-window) */
    .shell-window.tools-panel { background: #fff; color: #24292f; }
    .shell-window.tools-panel .shell-window-header { background: #f6f8fa; border-bottom-color: #d0d7de; }
    .shell-window.tools-panel .shell-window-title { color: #1f2328; }
    .shell-window.tools-panel .shell-window-content { background: #fff; }
    .shell-window.tools-panel .shell-window-header-btns button { color: #57606a; }
    .shell-window.tools-panel .shell-window-header-btns button:hover { color: #24292f; background: rgba(0,0,0,.06); }
    .shell-window.tools-panel .sid { color: #1f2328; }
    .shell-window.tools-panel .tools-tab { padding: 6px 10px; font-size: 0.78rem; border-bottom: 2px solid transparent; background: transparent; color: #656d76; cursor: pointer; }
    .shell-window.tools-panel .tools-tab:hover { color: #24292f; }
    .shell-window.tools-panel .tools-tab.active { color: #0969da; border-bottom-color: #0969da; font-weight: 600; }
    .file-row:hover { background: #f0f6fc; }
    #file-listing { padding: 0; }
    #file-listing:empty::after { content: 'Enter a path and click Load'; display: block; padding: 12px; color: #656d76; font-size: 0.82rem; }
    #file-up:hover, #file-upload-btn:hover, #file-ls:hover { background: #eaeef2; color: #24292f; }
    #file-path:focus { background: #fff; }

  
    /* File context menu (dark, matches shell-window) */
    .shell-file-ctx-menu { display:none; position:fixed; z-index:30001; background:#252526; border:1px solid #484f58; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.4); min-width:150px; padding:4px 0; }
    .file-ctx-item { padding:6px 14px; cursor:pointer; font-size:0.8rem; color:#ccc; white-space:nowrap; }
    .file-ctx-item:hover { background:#094771; color:#fff; }
    .file-ctx-item.file-ctx-danger { color:#f85149; }
    .file-ctx-item.file-ctx-danger:hover { background:#5a1d1d; color:#ff7b7b; }
    /* File row menu button */
    .shell-file-menu-btn { flex-shrink:0; width:22px; height:22px; padding:0; border:none; border-radius:4px; background:transparent; color:#8b949e; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .12s; font-size:1rem; line-height:1; }
    .shell-file-row:hover .shell-file-menu-btn { opacity:1; }
    .shell-file-menu-btn:focus { opacity:1; background:#30363d; color:#e6edf3; }
    .shell-file-menu-btn:active { background:#484f58; }
    /* File detail panel inside listing */
    .shell-file-detail { padding:12px; border-bottom:1px solid #30363d; }
    .shell-file-detail-actions { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
    .shell-file-detail-actions button { font-size:0.75rem; padding:4px 12px; border-radius:4px; border:1px solid #484f58; background:#2d2d2d; color:#ccc; cursor:pointer; }
    .shell-file-detail-actions button:hover { background:#3d3d3d; border-color:#666; color:#fff; }
    .shell-file-detail-actions .sf-dl { border-color:#2da44e; color:#2da44e; }
    .shell-file-detail-actions .sf-dl:hover { background:#1a3d1a; }
    .shell-file-detail-actions .sf-del { border-color:#f85149; color:#f85149; }
    .shell-file-detail-actions .sf-del:hover { background:#3d1a1a; }

  </style>
</head>
<body>
  <header class="app-header">
    <h1>termcp</h1>
  </header>
  <div class="dock">
    <div class="entries-toolbar">
      <div class="dock-title">Entries</div>
      <div class="entries-toolbar-actions">
        <button type="button" class="icon-btn icon-btn-primary" id="btn-add-conn" title="Add connection" aria-label="Add connection">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button type="button" class="icon-btn" id="btn-refresh-conn" title="Refresh list" aria-label="Refresh list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/><path d="M1 20v-6h6"/><path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14"/></svg>
        </button>
      </div>
    </div>
    <div id="conn-load-banner" class="conn-load-banner" role="status"></div>
    <div id="conn-grid" class="conn-grid"></div>
    <div class="dock-title" style="margin-top:22px">Sessions</div>
    <div id="session-load-banner" class="conn-load-banner" role="status" style="display:none"></div>
    <div id="session-grid" class="conn-grid"></div>

  </div>


  <div id="panel-tools" class="shell-window tools-panel" style="display:none;width:520px;height:70vh;min-width:340px;min-height:280px">
    <div class="shell-window-header">
      <div class="shell-window-title-cluster">
        <h3 class="shell-window-title">
          <span class="shell-title-id-group">
            <span class="shell-sid-copy">
              <span class="sid" id="panel-tools-sid">…</span>
              <button type="button" class="title-copy-btn" id="panel-tools-copy-sid" title="Copy session id" aria-label="Copy session id"><svg viewBox="0 0 16 16" width="12" height="12" aria-hidden="true" fill="currentColor"><path d="M5 2.5V2a1 1 0 011-1h6a1 1 0 011 1v8a1 1 0 01-1 1h-1v.5a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1h1zm1 .5H4v8h6v-8H6zm-1-1V2h6v8h-1V3.5a1 1 0 00-1-1H5z"/></svg></button>
            </span>
          </span>
        </h3>
      </div>
      <div class="shell-window-header-btns">
        <button type="button" class="tools-tab active" data-tab="fw">Fwd</button>
        <button type="button" class="tools-tab" data-tab="file">Files</button>
        <span style="flex:1;min-width:4px"></span>
        <button type="button" class="shell-window-collapse-btn" id="panel-tools-collapse" title="Collapse">
          <svg class="ic-d" viewBox="0 0 12 8" width="12" height="8"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M1 2l5 4 5-4"/></svg>
          <svg class="ic-u" viewBox="0 0 12 8" width="12" height="8" style="display:none"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M1 6l5-4 5 4"/></svg>
        </button>
        <button type="button" class="close-btn" id="panel-tools-close" title="Close">
          <svg viewBox="0 0 12 12" width="12" height="12"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M2 2l8 8M10 2L2 10"/></svg>
        </button>
      </div>
    </div>
    <div class="shell-window-content" style="display:flex;flex-direction:column">
      <p id="panel-tools-err" class="err" style="display:none"></p>
      <div id="tools-tab-fw" style="flex:1;min-height:0;overflow:auto;padding:8px 16px 16px">
        <input type="hidden" id="fw-ssh-config" value="">
        <div id="tools-fw-list-view">
          <div style="display:flex;align-items:center;margin-bottom:8px">
            <span style="font-size:0.75rem;text-transform:uppercase;color:#656d76">Active</span>
            <button type="button" class="icon-btn" id="fw-show-add" title="Add forwarding" style="width:26px;height:26px;margin-left:auto"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg></button>
          </div>
          <div id="tools-fw-list-items" style="font-size:0.8rem;color:#656d76">Loading...</div>
        </div>
      </div>
      <div id="tools-tab-file" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;padding:8px 16px 12px">
        <div style="display:flex;gap:0;margin-bottom:6px;align-items:stretch;flex-shrink:0;border:1px solid #d0d7de;overflow:hidden">
          <button type="button" id="file-up" title="Parent directory" style="width:34px;height:34px;padding:0;border:none;border-right:1px solid #e0e0e0;background:#f6f8fa;color:#57606a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M2 11l6-6 6 6"/></svg></button>
          <input type="text" id="file-path" placeholder="/" style="flex:1;min-width:0;border:none;outline:none;font-family:ui-monospace,monospace;font-size:0.82rem;padding:0 10px;background:#fff;color:#24292f" autocomplete="off">
          <input type="file" id="file-upload-input" style="display:none">
          <button type="button" id="file-upload-btn" title="Upload file" style="width:34px;height:34px;padding:0;border:none;border-left:1px solid #e0e0e0;background:#f6f8fa;color:#57606a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M8 2v9M4 6l4-4 4 4M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg></button>
          <button type="button" id="file-ls" title="Load" style="width:34px;height:34px;padding:0;border:none;border-left:1px solid #e0e0e0;background:#f6f8fa;color:#57606a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M1 8a7 7 0 0113-4.5M15 8a7 7 0 01-13 4.5"/><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M15 2v3h-3M1 14v-3h3"/></svg></button>
        </div>
        <div id="file-listing" style="flex:1;min-height:0;overflow:auto;font-size:0.82rem;font-family:ui-monospace,monospace;border:1px solid #d0d7de;background:#fff"></div>
      </div>
      <div id="file-ctx-menu" style="display:none;position:fixed;z-index:30000;background:#fff;border:1px solid #d0d7de;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:140px;padding:4px 0">
        <div class="file-ctx-item" data-action="download" style="padding:6px 12px;cursor:pointer;font-size:0.82rem" onmouseover="this.style.background='#f0f6fc'" onmouseout="this.style.background=''">Download</div>
        <div class="file-ctx-item" data-action="delete" style="padding:6px 12px;cursor:pointer;font-size:0.82rem;color:#cf222e" onmouseover="this.style.background='#fff0f0'" onmouseout="this.style.background=''">Delete</div>
      </div>
    </div>
    <div class="shell-window-resize-handle" title="Drag to resize"></div>
  </div>


  <div id="modal-forward" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal" style="max-width:420px">
      <div class="modal-h">
        <h2 id="modal-forward-title">New Forwarding</h2>
        <button type="button" id="modal-forward-close" style="width:28px;height:28px;padding:0;border:none;background:transparent;color:#57606a;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px" title="Close"><svg viewBox="0 0 12 12" width="12" height="12"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M2 2l8 8M10 2L2 10"/></svg></button>
      </div>
      <div class="modal-body">
        <p id="modal-forward-err" class="err" style="display:none"></p>
        <input type="hidden" id="fw-ssh-config-modal" value="">
        <label for="fw-direction">Direction</label>
        <select id="fw-direction">
          <option value="local">Local (ssh -L)</option>
          <option value="remote">Remote (ssh -R)</option>
          <option value="dynamic">SOCKS5 (ssh -D)</option>
        </select>
        <p style="font-size:0.7rem;color:#656d76;margin:-8px 0 8px 0">
          <span id="fw-dir-hint-local">local listen → remote target</span>
          <span id="fw-dir-hint-remote" style="display:none">remote listen → local target</span>
          <span id="fw-dir-hint-dynamic" style="display:none">SOCKS5 → any target</span>
        </p>
        <div id="fw-target-fields-modal">
          <label for="fw-remote-host">Target host</label>
          <input type="text" id="fw-remote-host" placeholder="e.g. localhost" autocomplete="off">
          <label for="fw-remote-port">Target port</label>
          <input type="number" id="fw-remote-port" placeholder="port" min="1" max="65535">
        </div>
        <label for="fw-local-host">Listen host</label>
        <input type="text" id="fw-local-host" placeholder="e.g. 127.0.0.1" autocomplete="off">
        <label for="fw-local-port" id="fw-local-port-label">Listen port (0 = random)</label>
        <input type="number" id="fw-local-port" placeholder="0" value="0" min="0" max="65535">
        <button type="button" class="btn btn-primary" id="fw-create" style="margin-top:8px">Create</button>
      </div>
    </div>
  </div>
  <div id="shell-windows-container" class="shell-windows-container" aria-live="polite"></div>

  <div id="modal-conn" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-h">
        <h2 id="modal-conn-title">Add connection</h2>
        <button type="button" id="modal-conn-close" style="width:28px;height:28px;padding:0;border:none;background:transparent;color:#57606a;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px" title="Close"><svg viewBox="0 0 12 12" width="12" height="12"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M2 2l8 8M10 2L2 10"/></svg></button>
      </div>
      <div class="modal-body">
        <p id="modal-conn-err" class="err" style="display:none"></p>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <label for="conn-name" style="margin:0;flex:1;font-size:0.85rem;font-weight:600">name</label>
          <button type="button" class="btn" id="conn-toggle-view" style="font-size:0.78rem;padding:2px 6px" title="Toggle between form and TOML">
            <svg class="toggle-icon-form" viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="1.5" y="1.5" width="11" height="11" rx="1.5"/><path d="M4.5 5h5M4.5 7.5h3M4.5 10h2"/></svg>
            <svg class="toggle-icon-toml" viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" style="display:none"><path d="M5 3.5L2 7l3 3.5M9 10.5l3-3.5-3-3.5"/></svg>
          </button>
        </div>
        <input type="text" id="conn-name" placeholder="my-server" autocomplete="off" style="margin-bottom:8px;width:100%">
        <!-- Form view -->
        <form id="conn-form-view" autocomplete="off" onsubmit="return false">
          <div class="conn-field"><label for="conn-f-host">Host</label><input type="text" id="conn-f-host" placeholder="192.168.1.1" autocomplete="off"></div>
          <div class="conn-row"><div class="conn-field"><label for="conn-f-port">Port</label><input type="number" id="conn-f-port" value="22" autocomplete="off"></div><div class="conn-field"><label for="conn-f-user">User</label><input type="text" id="conn-f-user" placeholder="root" autocomplete="username"></div></div>
          <div class="conn-field"><label for="conn-f-auth">Auth</label><select id="conn-f-auth"><option value="password">Password</option><option value="key">Private Key</option></select></div>
          <div class="conn-field" id="conn-f-password-wrap"><label for="conn-f-password">Password</label><div class="psw-wrap"><input type="password" id="conn-f-password" class="psw-input" autocomplete="new-password"><button type="button" class="psw-eye" title="Show password"><svg class="eye-open" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2.5"/></svg><svg class="eye-closed" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M6 3.5A6.4 6.4 0 018 3.2C12.5 3.2 15 8 15 8s-1 2-2.8 3.8M10 10a3 3 0 01-4-4M3.5 11.5l-2 2M3 8c0 0 2.5-5 7-5 1 0 2 .4 3 1M14.5 1l-13 13"/></svg></button></div></div>
          <div class="conn-field" id="conn-f-pem-wrap" style="display:none"><label for="conn-f-pem">Private Key</label><textarea id="conn-f-pem" spellcheck="false" rows="4"></textarea></div>
          <div class="conn-field"><label for="conn-f-passphrase">Key Passphrase (optional)</label><div class="psw-wrap"><input type="password" id="conn-f-passphrase" class="psw-input" autocomplete="new-password"><button type="button" class="psw-eye" title="Show"><svg class="eye-open" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2.5"/></svg><svg class="eye-closed" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M6 3.5A6.4 6.4 0 018 3.2C12.5 3.2 15 8 15 8s-1 2-2.8 3.8M10 10a3 3 0 01-4-4M3.5 11.5l-2 2M3 8c0 0 2.5-5 7-5 1 0 2 .4 3 1M14.5 1l-13 13"/></svg></button></div></div>
          <div class="conn-field"><label for="conn-f-shell">Default Shell (optional)</label><input type="text" id="conn-f-shell" placeholder="auto-detect" autocomplete="off"></div>
        </form>
        <!-- JSON view -->
        <div id="conn-config-view" style="display:none">
          <label for="conn-config">config</label>
          <textarea id="conn-config" spellcheck="false"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="conn-delete" style="display:none">Delete</button>
          <button type="button" class="btn btn-primary" id="conn-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-start" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal" style="max-width:420px">
      <div class="modal-h">
        <h2 id="start-title">Start session</h2>
        <button type="button" class="btn" id="modal-start-close">Close</button>
          </div>
      <div class="modal-body">
        <p id="modal-start-err" class="err" style="display:none"></p>
        <input type="hidden" id="start-ssh-config">
        <label for="start-cmd">Command (optional)</label>
        <input type="text" id="start-cmd" placeholder="Empty = SSH login shell; or bash, powershell, …" autocomplete="off">
        <label for="start-mode">Mode</label>
        <select id="start-mode"><option value="pty">pty</option><option value="pipe">pipe</option></select>
        <div class="modal-actions">
          <button type="button" class="btn btn-primary" id="start-run">Connect</button>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/xterm/xterm.js"></script>
  <script>
(function () {
  var shellWindowCount = 0;
  var startConnName = '';
  var editingConnName = '';
  window._pendingTerminalWatch = Object.create(null);

  function escapeHtml(s) {

  var TERMINAL_ICON_SRC = 'icons/terminal-shell.svg';

  function terminalIconImgHtml() {
    return '<img class="terminal-shell-icon" src="' + TERMINAL_ICON_SRC + '" width="16" height="16" alt="" draggable="false">';
  }

  function copyTextToClipboard(text) {
    text = String(text || '');
    if (!text) return Promise.resolve();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () { return copyTextFallback(text); });
    }
    return copyTextFallback(text);
  }

  function copyTextFallback(text) {
    return new Promise(function (resolve, reject) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.cssText = 'position:fixed;left:-9999px;top:0';
      document.body.appendChild(ta);
      ta.select();
      try {
        if (document.execCommand('copy')) resolve();
        else reject(new Error('copy failed'));
      } catch (e) {
        reject(e);
      }
      document.body.removeChild(ta);
    });
  }

  /** Initial placement for a new .shell-window (caller must have incremented shellWindowCount). */

      left = Math.max(8, Math.min(clickEvent.clientX - winW / 2, window.innerWidth - winW - 8));
      top = Math.max(8, Math.min(clickEvent.clientY - th, window.innerHeight - winH - 8));

  function formatSize(bytes) {

    return (i === 0 ? size : size.toFixed(1)) + ' ' + units[i];

    if (term._stbRaf) return;
    term._stbRaf = requestAnimationFrame(function () {
      term._stbRaf = 0;
      applyTwice();
    });
  }

  /**
   * After chunked history paint: align viewport scroll metrics + one PTY sync.
   * ResizeObserver is not active during bootstrap — registering fit/resize while term.write streams history desyncs native scroll from xterm's buffer.
   */
  function shellTermSyncViewportAfterBufferChange(term, termEl, win) {
    if (!term) return;
    try { fitShellTerminal(term, termEl, win, false); } catch (e0) {}
    try { shellTermScrollToBottom(term, true); } catch (e1) {}
    requestAnimationFrame(function () {
      try {
        var c = term._core;
        if (c && c.viewport && typeof c.viewport.syncScrollArea === 'function') c.viewport.syncScrollArea();
      } catch (e2) {}
      try {
        if (typeof term.refresh === 'function') term.refresh(0, term.rows - 1);
      } catch (e3) {}
      requestAnimationFrame(function () {
        try {
          var c2 = term._core;
          if (c2 && c2.viewport && typeof c2.viewport.syncScrollArea === 'function') c2.viewport.syncScrollArea();
        } catch (e4) {}
        try { fitShellTerminal(term, termEl, win, true); } catch (e5) {}
        attachXtermViewportFirstInteractionSync(term);
      });
    });
  }

  function getPendingShellWindowForConn(connName) {
    var c = shellWindowsEl();
    if (!c || !connName) return null;
    var wins = c.querySelectorAll('.shell-window');
    for (var i = 0; i < wins.length; i++) {
      var w = wins[i];
      if (w._placeholder && w._pendingConnName === connName) return w;
    }
    return null;
  }

  // ---- Shell channel tabs (SSH multiplexing) ----

  /** Get sibling tab next to the given sessionId after removal (or null). */
  function _channelNeighbor(win, sid) {
    var kids = win.querySelector('.shell-channel-tabs').querySelectorAll('.shell-channel-tab');
    var found = false;
    var prev = null;
    for (var i = 0; i < kids.length; i++) {
      if (kids[i].getAttribute('data-chsid') === sid) { found = true; continue; }
      if (found) return kids[i].getAttribute('data-chsid');
      prev = kids[i].getAttribute('data-chsid');
    }
    return prev || null;
  }

  /** Create a channel tab + xterm instance for sessionId. */
  function createChannelTab(win, sessionId, optLabel) {
    if (!win._channels) { win._channels = {}; win._channelCount = 0; win._channelSeq = 0; }
    if (win._channels[sessionId]) { switchChannelTab(win, sessionId); return; }
    var label = optLabel || ('shell-' + (win._channelSeq + 1));

    var tabsBar = win.querySelector('.shell-channel-tabs');
    var body = win.querySelector('.shell-channel-body');
    var addBtn = tabsBar ? tabsBar.querySelector('.shell-channel-tab-add') : null;
    var emptyEl = win.querySelector('.shell-channel-empty');

    // Hide empty state, restore body
    if (emptyEl) emptyEl.classList.remove('show');
    if (body) body.style.display = '';

    // Create tab
    var tab = document.createElement('div');
    tab.className = 'shell-channel-tab active';
    tab.setAttribute('data-chsid', sessionId);
    tab.innerHTML = '<span class="shell-channel-tab-label">' + escapeHtml(label || 'shell') + '</span>' +
      '<button type="button" class="shell-channel-tab-close" title="Close shell">&times;</button>';
    if (addBtn) tabsBar.insertBefore(tab, addBtn);

    // Deactivate all other tabs
    tabsBar.querySelectorAll('.shell-channel-tab').forEach(function(t) {
      if (t !== tab) t.classList.remove('active');
    });

    // Create instance
    var inst = document.createElement('div');
    inst.className = 'shell-channel-instance active';
    inst.setAttribute('data-chsid', sessionId);
    body.appendChild(inst);
    // Hide other instances
    body.querySelectorAll('.shell-channel-instance').forEach(function(el) {
      if (el !== inst) el.classList.remove('active');
    });

    // Create xterm
    var term = new Terminal({
      cursorBlink: true,
      fontSize: 13,
      fontFamily: 'Consolas, Monaco, monospace',
      theme: {
        background: '#1e1e1e',
        foreground: '#d4d4d4',
        cursor: '#d4d4d4',
        cursorAccent: '#1e1e1e',
        selectionBackground: '#264f7844'
      },
      scrollback: 100000
    });
    // Hide until first fit to prevent garbled flash.
    inst.style.visibility = 'hidden';
    term.open(inst);
    attachXtermViewportScrollbarGuard(term);
    attachTermBrowserChordShield(term);

    // Store channel state
    win._channels[sessionId] = {
      term: term,
      instEl: inst,
      tabEl: tab,
      streamDone: false,
      fitRo: null
    };
    win._activeChannelSid = sessionId;
    win._channelCount += 1;
    win._channelSeq += 1;

    // Deactivate previous tabs
    Object.keys(win._channels).forEach(function(sid) {
      if (sid !== sessionId && win._channels[sid].tabEl) {
        win._channels[sid].tabEl.classList.remove('active');
      }
    });

    // Setup input gate
    setupShellOnDataUserGate(win, term);

    // onData
    term.onData(function (data) {
      if (win._inputClosed) return;
      var ch = win._channels[sessionId];
      if (!ch) return;
      if (ch.streamDone) {
        if (data === '\r' || data === '\n' || data === '\r\n') { closeChannelTab(win, sessionId); }
        return;
      }
      if (!win._shellUserInputReady) return;
      if (!window._uiWS || window._uiWS.readyState !== 1) return;
      try {
        window._uiWS.send(JSON.stringify({ type: 'input', id: sessionId, d: strToUtf8B64(data), nl: false }));
      } catch (e) {}
    });

    // Bootstrap history + watch. Show after first fit to prevent garbled flash.
    try { fitShellTerminal(term, inst, win, false); } catch (eFit) {}
    inst.style.visibility = '';
    bootstrapShellFullHistory(sessionId, term).finally(function () {
      queueTerminalWatch(sessionId);
      try {
        var ro = attachShellTerminalResizeObserverForChannel(win, term, inst, sessionId);
        win._channels[sessionId].fitRo = ro;
        shellTermSyncViewportAfterBufferChange(term, inst, win);
      } catch (eBoot) {}
    });

    // Tab click → switch
    tab.addEventListener('click', function(e) {
      if (e.target.closest('.shell-channel-tab-close')) return;
      switchChannelTab(win, sessionId);
    });

    // Close button
    var closeBtn = tab.querySelector('.shell-channel-tab-close');
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      closeChannelTab(win, sessionId);
    });

    // Focus
    requestAnimationFrame(function() { try { term.focus(); } catch(e) {} });

    return term;
  }

  /** Switch active channel tab. */
  function switchChannelTab(win, sessionId) {
    var ch = win._channels && win._channels[sessionId];
    if (!ch) return;
    if (win._activeChannelSid === sessionId) return;
    win._activeChannelSid = sessionId;
    win._shellUserInputReady = true;  // explicit switch = user intends to type

    // Tabs
    var tabsBar = win.querySelector('.shell-channel-tabs');
    if (tabsBar) {
      tabsBar.querySelectorAll('.shell-channel-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-chsid') === sessionId);
      });
    }
    // Instances
    var body = win.querySelector('.shell-channel-body');
    if (body) {
      body.querySelectorAll('.shell-channel-instance').forEach(function(el) {
        el.classList.toggle('active', el.getAttribute('data-chsid') === sessionId);
      });
    }

    // Fit + focus
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        fitShellTerminal(ch.term, ch.instEl, win, true);
        try { ch.term.focus(); } catch(e) {}
      });
    });
  }

  /** Close a channel tab. Terminates the shell process and cleans up. */
  function closeChannelTab(win, sessionId) {
    var ch = win._channels && win._channels[sessionId];
    if (!ch) return;

    ch.streamDone = true;

    // Unsubscribe
    sendTerminalWatch(sessionId, false);

    // Send terminate request (fire-and-forget) — child shells only close their channel.
    fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/terminate', { method: 'POST' }).catch(function() {});

    // Dispose xterm
    try {
      if (ch.fitRo) { ch.fitRo.unobserve(ch.instEl); }
    } catch(e) {}
    try { ch.term.dispose(); } catch(e) {}

    // Remove DOM
    if (ch.tabEl && ch.tabEl.parentNode) ch.tabEl.parentNode.removeChild(ch.tabEl);
    if (ch.instEl && ch.instEl.parentNode) ch.instEl.parentNode.removeChild(ch.instEl);

    // Update state
    delete win._channels[sessionId];
    win._channelCount = Math.max(0, win._channelCount - 1);
    if (win._channelCount === 0) win._channelSeq = 0;

    // Switch or show empty
    if (win._activeChannelSid === sessionId) {
      var neighbor = _channelNeighbor(win, sessionId);
      if (neighbor && win._channels[neighbor]) {
        switchChannelTab(win, neighbor);
      } else if (win._channelCount === 0) {
        win._activeChannelSid = null;
        _showChannelEmpty(win, true);
      }
    }
  }

  function _showChannelEmpty(win, show) {
    var el = win.querySelector('.shell-channel-empty');
    if (el) el.classList.toggle('show', !!show);
    var body = win.querySelector('.shell-channel-body');
    if (body) body.style.display = show ? 'none' : '';
  }

  /** "+" button / empty-state click handler. */
  function addChannelClick(win) {
    if (!win._parentSid) return;
    fetch('/api/sessions/start', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain; charset=utf-8' },
      body: JSON.stringify({ parent_session_id: win._parentSid, rows: 24, cols: 80 })
    }).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      return r.json();
    }).then(function(j) {
      createChannelTab(win, j.session_id);
    }).catch(function(err) { console.error('add channel failed', err); });
  }

  /** Wire up channel tab bar events (called once per window). */
  function _wireChannelTabBar(win) {
    var addBtn = win.querySelector('.shell-channel-tab-add');
    if (addBtn && !addBtn._chWired) {
      addBtn._chWired = true;
      addBtn.addEventListener('click', function() { addChannelClick(win); });
    }
    var emptyBtn = win.querySelector('.shell-channel-empty-add');
    if (emptyBtn && !emptyBtn._chWired) {
      emptyBtn._chWired = true;
      emptyBtn.addEventListener('click', function() { addChannelClick(win); });
    }
  }

  /** ResizeObserver wrapper that tracks which channel SID to resize. */
  function attachShellTerminalResizeObserverForChannel(win, term, termEl, sessionId) {
    var ro = new ResizeObserver(function() {
      scheduleShellRemoteResize(win, term, termEl, sessionId);
    });
    ro.observe(termEl);
    return ro;
  }

  /** Initialize shell window UI (header buttons, drag, resize, tab switching) — no xterm. */
  function _initShellWindowUI(win, connLabel, sessionId, clickEvent) {
    var header = win.querySelector('.shell-window-header');

      });

        icU.style.display = win.classList.contains('shell-window-collapsed') ? '' : 'none';
      }

      if (!win.classList.contains('shell-window-collapsed')) {
        var ch = win._activeChannelSid && win._channels && win._channels[win._activeChannelSid];
        if (ch && ch.term && ch.instEl) fitShellTerminal(ch.term, ch.instEl, win, true);
      }
    });

    setupShellWindowDrag(win, header);
    setupShellWindowResize(win);

    // --- Header tab switching (term / fw / file panels) ---
    var tabBtns = win.querySelectorAll('.shell-tab-btn');
    var terminalWrap = win.querySelector('.shell-terminal-wrap');
    var tabPanels = win.querySelectorAll('.shell-tab-panel');
    tabBtns.forEach(function(btn) {

        if (tab === 'term') {
          var ch = win._activeChannelSid && win._channels && win._channels[win._activeChannelSid];
          if (ch && ch.term && ch.instEl) {
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                fitShellTerminal(ch.term, ch.instEl, win, true);
                try { ch.term.focus(); } catch(e2) {}
              });
            });
          }
        }
        if (tab === 'fw') refreshShellFwList(win);
      });
    });

    // Forward "add" button
    var fwAddBtn = win.querySelector('.shell-fw-add-btn');
    if (fwAddBtn) {
      fwAddBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        _toolPanelSshCfg = connLabel || 'internal';
        document.getElementById('fw-ssh-config-modal').value = connLabel || 'internal';
        document.getElementById('fw-remote-host').value = '';
        document.getElementById('fw-remote-port').value = '';
        document.getElementById('fw-local-host').value = '127.0.0.1';
        document.getElementById('fw-local-port').value = '0';
        document.getElementById('fw-direction').value = 'local';
        var errEl = document.getElementById('modal-forward-err');
        if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
        document.getElementById('fw-direction').dispatchEvent(new Event('change'));
        showModal('modal-forward');
      });
    }
    var fwRefreshBtn = win.querySelector('.shell-fw-refresh-btn');
    if (fwRefreshBtn) {
      fwRefreshBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var svg = this.querySelector('svg');
        if (svg) {
          svg.style.transition = 'transform 0.6s ease';
          svg.style.transform = 'rotate(360deg)';
          setTimeout(function() { svg.style.transition = 'none'; svg.style.transform = 'rotate(0deg)'; }, 1220);
        }
        refreshShellFwList(win);
        loadForwards();
      });
    }

    // Refresh forwardings list for this window
    function refreshShellFwList(w) {
      w = w || win;
      var listEl = w.querySelector('.shell-fw-list');
      if (!listEl) return;
      fetch('/api/forwards').then(function(r){return r.json()}).then(function(j){
        var fwds = (j.forwards||[]).filter(function(f){ return f.ssh_config === (connLabel||'internal'); });
        if (!fwds.length) { listEl.innerHTML = '<div style="padding:16px;color:#8b949e;text-align:center">No active forwards</div>'; return; }
        listEl.innerHTML = fwds.map(function(f){
          var dirLabel = f.direction;
          var dirColor = dirLabel === 'local' ? '#3fb950' : (dirLabel === 'dynamic' ? '#58a6ff' : '#d29922');
          return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #21262d;transition:background .1s" onmouseover="this.style.background=\'#161b22\'" onmouseout="this.style.background=\'\'">' +
            '<span style="font-size:0.65rem;font-weight:600;text-transform:uppercase;padding:1px 5px;border-radius:3px;color:' + dirColor + ';border:1px solid ' + dirColor + ';flex-shrink:0;min-width:42px;text-align:center">' + escapeHtml(dirLabel) + '</span>' +
            '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.78rem"><span style="color:#8b949e">' + escapeHtml(f.listen_addr) + '</span> <span style="color:#484f58">→</span> <span style="color:#c9d1d9">' + escapeHtml(f.target_addr) + '</span></span>' +
            '<button class="shell-fw-del-btn" data-fwid="' + escapeHtml(f.forward_id) + '" style="padding:2px 6px;font-size:0.68rem;border:1px solid transparent;border-radius:3px;background:transparent;color:#484f58;cursor:pointer;flex-shrink:0" onmouseover="this.style.borderColor=\'#f85149\';this.style.color=\'#f85149\'" onmouseout="this.style.borderColor=\'transparent\';this.style.color=\'#484f58\'">✕</button>' +
            '</div>';
        }).join('');
        listEl.querySelectorAll('.shell-fw-del-btn').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var fwid = this.getAttribute('data-fwid');
            fetch('/api/forwards/' + encodeURIComponent(fwid), {method: 'DELETE'})
              .then(function() { refreshShellFwList(); loadForwards(); document.querySelectorAll('.shell-window').forEach(function(w){if(w._refreshFwList)w._refreshFwList();}); });
          });
        });
        // Auto-scroll to bottom so new items are visible
        listEl.scrollTop = listEl.scrollHeight;
      }).catch(function(){});
    }
    win._refreshFwList = function() { refreshShellFwList(win); };

    // File operations for this shell window
    var filePathInput = win.querySelector('.shell-file-path');
    var fileListing = win.querySelector('.shell-file-listing');
    var fileUploadInput = win.querySelector('.shell-file-upload-input');
    var fileCtxMenu = win.querySelector('.shell-file-ctx-menu');

    // Dismiss context menu on outside click
    document.addEventListener('click', function(e) {
      if (!fileCtxMenu || fileCtxMenu.style.display === 'none') return;
      if (!fileCtxMenu.contains(e.target)) fileCtxMenu.style.display = 'none';
    });

    function shellFileBrowse() {
      var path = filePathInput.value.trim() || '/';
      if (!fileListing) return;
      fileListing.innerHTML = '<div style="padding:8px;color:#8b949e">Loading...</div>';
      if (fileCtxMenu) fileCtxMenu.style.display = 'none';
      fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/files?path=' + encodeURIComponent(path))
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(data) { renderShellFileList(data, path); })
        .catch(function(e) { fileListing.innerHTML = '<div style="padding:8px;color:#f85149">Error: ' + escapeHtml(String(e.message||e)) + '</div>'; });
    }

    var _ctxPath = '', _ctxIsDir = false;

    function fileMenuAction(action) {
      if (fileCtxMenu) fileCtxMenu.style.display = 'none';
      var path = _ctxPath;
      if (!path) return;
      var base = path.replace(/\/+$/, '');
      var name = base.split('/').pop() || '';

      if (action === 'download') {
        window.open('/api/sessions/' + encodeURIComponent(sessionId) + '/files/download?path=' + encodeURIComponent(path), '_blank');
      } else if (action === 'delete') {
        if (!confirm('Delete ' + path + '?')) return;
        fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/files/delete?path=' + encodeURIComponent(path), {method:'DELETE'})
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function() { shellFileBrowse(); })
          .catch(function(e) { alert('Delete failed: ' + e.message); });
      } else if (action === 'rename') {
        var newName = prompt('Rename ' + name, name);
        if (!newName || newName === name) return;
        var parts = base.split('/'); parts.pop();
        var to = (parts.join('/') || '') + '/' + newName;
        fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/files/rename?from=' + encodeURIComponent(path) + '&to=' + encodeURIComponent(to), {method:'POST'})
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function() { shellFileBrowse(); })
          .catch(function(e) { alert('Rename failed: ' + e.message); });
      }
    }

    function showFileMenu(e, path, isDir) {
      e.preventDefault();

      _ctxIsDir = isDir;

      });
      fileCtxMenu.style.display = 'block';
      // Position near cursor, within viewport
      var x = (e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX) || e.pageX || 100;
      var y = (e.touches && e.touches[0] ? e.touches[0].clientY : e.clientY) || e.pageY || 100;
      var mw = fileCtxMenu.offsetWidth || 150;
      var mh = fileCtxMenu.offsetHeight || 120;
      if (x + mw > window.innerWidth) x = window.innerWidth - mw - 4;
      if (y + mh > window.innerHeight) y = window.innerHeight - mh - 4;
      fileCtxMenu.style.left = Math.max(0, x) + 'px';
      fileCtxMenu.style.top = Math.max(0, y) + 'px';
    }

    if (fileCtxMenu) {
      fileCtxMenu.addEventListener('click', function(e) {
        var it = e.target.closest('.file-ctx-item');
        if (!it) return;
        fileMenuAction(it.dataset.action);

    // Event delegation for file detail action buttons
    fileListing.addEventListener('click', function(e) {

      e.stopPropagation();
      var path = btn.getAttribute('data-file-path') || btn.parentElement.getAttribute('data-file-path');

      if (action === 'download') {
        window.open('/api/sessions/' + encodeURIComponent(sessionId) + '/files/download?path=' + encodeURIComponent(path), '_blank');
      } else if (action === 'delete') {
        if (!confirm('Delete ' + path + '?')) return;
        fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/files/delete?path=' + encodeURIComponent(path), {method:'DELETE'})
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function() { shellFileBrowse(); })
          .catch(function(e) { alert('Delete failed: ' + e.message); });
      } else if (action === 'rename') {
        var pre = btn.getAttribute('data-file-name') || path.split('/').pop() || '';
        var nm = prompt('Rename', pre);
        if (!nm || nm === pre) return;
        var pp = path.replace(/\/+$/, '').split('/'); pp.pop();
        var to = (pp.join('/') || '') + '/' + nm;
        fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/files/rename?from=' + encodeURIComponent(path) + '&to=' + encodeURIComponent(to), {method:'POST'})
          .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function() { shellFileBrowse(); })
          .catch(function(e) { alert('Rename failed: ' + e.message); });
      }
    });

    var _longPressTimer = null;
    function renderShellFileList(data, currentPath) {
      filePathInput.value = currentPath;
      if (!data.is_dir) {
        // File detail view — show metadata with action buttons

  /** POST /api/sessions/start then open shell window. command/mode may be '' to use server defaults (login shell, profile default_mode). */
  function startSessionAndOpenShell(connName, clickEvt, opt) {
    opt = opt || {};
    var dup = getPendingShellWindowForConn(connName);
    if (dup) {
      bringShellWindowToFront(dup);
      return Promise.resolve(null);
    }
    var ac = new AbortController();
    var pendingWin = openPendingShellWindow(connName, clickEvt, ac);
    if (!pendingWin) {
      return Promise.reject(new Error('Could not open terminal window'));
    }
    var body = {
      command: opt.command != null ? opt.command : '',
      args: opt.args || [],
      mode: opt.mode != null ? opt.mode : '',
      ssh_config: connName,
      rows: 24,
      cols: 80
    };
    if (opt.name) body.name = opt.name;
    else if (connName) body.name = connName;
    return fetch('/api/sessions/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body), signal: ac.signal })
      .then(function (r) {
        if (!r.ok) return r.text().then(function (t) { throw new Error(t || r.status); });
        return r.json();
      })
      .then(function (j) {
        var sid = j && j.session_id;
        if (!sid) throw new Error('No session_id in response');
        pendingWin._connectAbort = null;
        if (pendingWin.parentNode) {
          finalizePendingShellWindow(pendingWin, connName || 'session', sid, clickEvt);
        } else {
          openShellWindow(connName || 'session', sid, clickEvt);
        }
        return j;
      })
      .catch(function (err) {
        if (pendingWin && pendingWin.parentNode && pendingWin._placeholder) {
          closeShellWindow(pendingWin);
        }
        return Promise.reject(err);
      });
  }
