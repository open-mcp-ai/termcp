name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          mkdir -p dist
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for PLATFORM in "${PLATFORMS[@]}"; do
            GOOS="${PLATFORM%%/*}"
            GOARCH="${PLATFORM##*/}"
            BINARY="termcp-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              BINARY="${BINARY}.exe"
            fi
            echo "Building ${BINARY}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags="-s -w" \
              -o "dist/${BINARY}" \
              ./cmd/server
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
